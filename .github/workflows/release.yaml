name: Build

on:
  push:
    branches:
      - master

env:
  PYTHON_VERSION: 3.13

permissions:
  packages: write
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Detect version
        run: |
          echo "VERSION=$(grep '^version =' pyproject.toml | cut -d '"' -f2 | xargs)" >> $GITHUB_ENV

      - name: Release
        run: |
          if gh release view v$VERSION > /dev/null 2>&1; then
            echo "Release v$VERSION already exists. Skipping"
          else
            echo "Preparing release: v$VERSION"
          
            mkdir deye-exporter-$VERSION
            cp LICENSE deye-exporter-$VERSION
            cp NOTICE deye-exporter-$VERSION
            cp README.md deye-exporter-$VERSION
          
            mkdir deye-exporter-$VERSION/plugins
            cp plugins/*.py deye-exporter-$VERSION/plugins
            
            ls -la build/deye-exporter-$VERSION
            tar -czvf deye-exporter-$VERSION.tar.gz deye-exporter-$VERSION
          
            echo "Release prepared"
            ls -la .
            
            echo "Releasing..
            gh release create v$VERSION \
              --repo tarmolehtpuu/deye-exporter \
              --title deye-exporter-$VERSION \
              --generate-notes *.tar.gz
          
            echo "Release $VERSION - DONE"
          fi
        working-directory: build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
