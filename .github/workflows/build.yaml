name: Build

on:
  push:
    branches-ignore:
      - master
  pull_request:
    branches-ignore:
      - master

env:
  PYTHON_VERSION: 3.11


jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build
        run: make build
